import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://xgrzymhgssxjjkogvuvw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhncnp5bWhnc3N4amprb2d2dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzAyNTYsImV4cCI6MjA4Nzg0NjI1Nn0.A6tbTA6D2mmGdNTrm2oS5HSTJzgkMFbGARQQi5dL-TQ"
)

/* FORMAT DATE */
function formatDate(dateStr){
if(!dateStr) return "-"
const d = new Date(dateStr)
return d.toLocaleDateString("en-GB", {
day:"2-digit",
month:"long",
year:"numeric"
})
}

/* LOAD REQUESTS */
async function loadRequests(){

const { data, error } = await supabase
.from("booking_requests")
.select(`
  id,
  event_name,
  booking_date,
  total_students,
  description,
  status,
  profiles(name,employee_id),
  venues(venue_name),
  booking_slots(
    slots(start_time,end_time)
  )
`)
.order("id",{ascending:false})   // 🔥 SHOW ALL

let container = document.getElementById("requests")
container.innerHTML=""

if(error){
console.error(error)
container.innerHTML = "<p>Error loading requests</p>"
return
}

if(!data || data.length === 0){
container.innerHTML = "<p style='text-align:center;'>No Requests</p>"
return
}

data.forEach(req => {

/* SLOT TIMINGS */
const slots = (req.booking_slots || []).map(s => {
if(!s.slots) return ""
return `${s.slots.start_time} - ${s.slots.end_time}`
}).filter(Boolean).join(", ") || "N/A"

/* COLOR */
let color = ""
if(req.status === "pending") color = "#fff3cd"
if(req.status === "accepted") color = "#d4edda"
if(req.status === "rejected") color = "#f8d7da"

/* CARD */
const card = document.createElement("div")
card.className = "request-card"
card.id = `req-${req.id}`
card.style.background = color

card.innerHTML = `

<h2 class="main-title">${req.event_name || "-"}</h2>
<p class="title-label">Title</p>

<p><b>Faculty:</b> 
${req.profiles?.name || "Unknown"} 
(${req.profiles?.employee_id || "No ID"})
</p>

<p><b>Venue:</b> ${req.venues?.venue_name || "N/A"}</p>

<p><b>Date:</b> ${formatDate(req.booking_date)}</p>

<p><b>Slots:</b> ${slots}</p>

<p><b>Students:</b> ${req.total_students || 0}</p>

<p><b>Status:</b> ${(req.status || "").toUpperCase()}</p>

<p class="desc-label">Description</p>
<div class="desc-box">
  ${req.description || "No description"}
</div>

<div class="buttons">
${req.status === "pending" ? `
<button class="acceptBtn">Accept</button>
<button class="rejectBtn">Reject</button>
` : `<p><b>Status:</b> ${(req.status).toUpperCase()}</p>`}
</div>

`

container.appendChild(card)

/* BUTTONS */
if(req.status === "pending"){
card.querySelector(".acceptBtn").onclick = () => accept(req.id)
card.querySelector(".rejectBtn").onclick = () => reject(req.id)
}

})

}

/* ACCEPT */
async function accept(id){

if(!confirm("Accept this booking?")) return

const { data:{ session } } = await supabase.auth.getSession()

const { error } = await supabase
.from("booking_requests")
.update({ status: "accepted" })
.eq("id", id)

if(error){
alert("Update failed")
console.error(error)
return
}

/* INSERT APPROVAL */
await supabase.from("approvals").insert({
booking_id: id,
approved_by: session.user.id,
status: "accepted",
comments: "Approved",
approved_at: new Date().toISOString()
})

loadRequests()  // 🔥 refresh UI
}

/* REJECT */
async function reject(id){

if(!confirm("Reject this booking?")) return

const { data:{ session } } = await supabase.auth.getSession()

const { error } = await supabase
.from("booking_requests")
.update({ status: "rejected" })
.eq("id", id)

if(error){
alert("Update failed")
return
}

await supabase.from("approvals").insert({
booking_id: id,
approved_by: session.user.id,
status: "rejected",
comments: "Rejected",
approved_at: new Date().toISOString()
})

loadRequests()
}

/* INIT */
window.addEventListener("DOMContentLoaded", async () => {

const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");
const logoutBtn = document.getElementById("logoutBtn");

/* DROPDOWN (UNCHANGED) */
profileBtn.addEventListener("click", (e)=>{
e.stopPropagation();
profileMenu.classList.toggle("show");
});

document.addEventListener("click", ()=>{
profileMenu.classList.remove("show");
});

/* LOGOUT */
logoutBtn.addEventListener("click", async (e)=>{
e.preventDefault();
await supabase.auth.signOut();
location.href = "index.html";
});

/* SESSION */
const { data:{ session } } = await supabase.auth.getSession();

if(!session){
location.href="index.html";
return;
}

/* ROLE */
const { data: profile } = await supabase
.from("profiles")
.select("*")
.eq("id", session.user.id)
.single();

if(profile.role !== "admin"){
alert("Access Denied")
location.href = "dashboard.html"
return
}

/* NAV VISIBILITY (UNCHANGED) */
document.getElementById("bookVenue").style.display="none";
document.getElementById("myBookings").style.display="none";
document.getElementById("acceptBooking").style.display="block";

/* LOAD */
loadRequests();

});

</script>
