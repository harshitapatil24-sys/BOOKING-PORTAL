<html>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

<img src="pccoe.jpg" class="logo">

<ul class="nav-links">

<li><a href="#">Halls</a></li>

<div class="profile">

<div class="dropdown" id="profileMenu">

</div>

</div>

<!-- USER BAR -->
<div class="userbar">
<span id="facultyInfo">Loading user...</span>
</div>


<!-- PAGE TITLE -->
<section style="text-align:center;padding:30px;">
<h1>Booking Requests</h1>
<p>Admin Approval Dashboard</p>
</section>

<!-- REQUESTS -->
<section id="requests" class="cards"></section>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */

const client = supabase.createClient(
"https://xgrzymhgssxjjkogvuvw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhncnp5bWhnc3N4amprb2d2dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzAyNTYsImV4cCI6MjA4Nzg0NjI1Nn0.A6tbTA6D2mmGdNTrm2oS5HSTJzgkMFbGARQQi5dL-TQ"
);



/* PROFILE MENU */

const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");

profileBtn.addEventListener("click",(e)=>{
e.stopPropagation();
profileMenu.classList.toggle("show");
});

document.addEventListener("click",()=>{
profileMenu.classList.remove("show");
});



/* LOAD PROFILE */

async function loadProfile(){

const { data:{ session } } = await client.auth.getSession()

if(!session){
location="login.html"
return
}

const { data:profile } = await client
.from("profiles")
.select("*")
.eq("id",session.user.id)
.single()



/* SHOW USER INFO */

document.getElementById("facultyInfo").innerText =
`${profile.name} | ${profile.employee_id} | ${profile.role}`



/* SHOW ADMIN MENU */

document.getElementById("acceptBooking").style.display="block"

}

loadProfile()



/* LOAD BOOKING REQUESTS */

async function loadRequests(){

const { data } = await client
.from("booking_requests")
.select("*")
.order("id",{ascending:false})

const container = document.getElementById("requests")

container.innerHTML=""

if(!data || data.length===0){

container.innerHTML="<p>No Requests</p>"
return

}



data.forEach(req=>{

let disabled = req.status!=="pending" ? "disabled":""

container.innerHTML += `

<div class="card">

<h3>${req.event_name}</h3>

<p><b>Venue:</b> ${req.venue}</p>

<p><b>Date:</b> ${req.booking_date}</p>

<p><b>Slot:</b> ${req.slot_id}</p>

<p><b>Status:</b> ${req.status}</p>

<button class="actionBtn" ${disabled}
onclick="accept(${req.id})">Accept</button>

<button class="actionBtn" ${disabled}
onclick="reject(${req.id})">Reject</button>

</div>

`

})

}

loadRequests()



/* ACCEPT */

async function accept(id){

await client
.from("booking_requests")
.update({status:"approved"})
.eq("id",id)

loadRequests()

}



/* REJECT */

async function reject(id){

await client
.from("booking_requests")
.update({status:"rejected"})
.eq("id",id)

loadRequests()

}

window.accept=accept
window.reject=reject



/* LOGOUT */

document.getElementById("logoutBtn").onclick=async()=>{

await client.auth.signOut()
location="login.html"

}

</script>

</body>
</html>
