)

/* LOAD BOOKINGS */
async function loadMyBookings(){

try{

const { data:{ session }, error:sessionError } = await supabase.auth.getSession()

if(sessionError || !session){
location="index.html"
return
}

const { data, error } = await supabase
.from("booking_requests")
.select(`
  id,
  event_name,
  booking_date,
  total_students,
  description,
  status,
  venues(venue_name),
  booking_slots(
    slots(start_time, end_time)
  )
`)
.eq("user_id", session.user.id)
.order("id", { ascending:false })

if(error){
console.error("Fetch error:", error.message)
document.getElementById("myBookings").innerHTML = "<p>Error loading bookings</p>"
return
}

let container = document.getElementById("myBookings")
container.innerHTML = ""

if(!data || data.length === 0){
container.innerHTML = "<p>No bookings yet</p>"
return
}

/* render cards */
data.forEach(b => {

let color = "#3498db"

/* FIXED COLORS (better visibility) */
if(b.status === "pending") color = "#fff3cd"       // light yellow
if(b.status === "accepted") color = "#d4edda"      // light green
if(b.status === "rejected") color = "#f8d7da"      // light red

/* SAFE SLOT HANDLING */
const slots = (b.booking_slots || []).map(s => {
if(!s.slots) return ""
return `${s.slots.start_time} - ${s.slots.end_time}`
}).filter(Boolean).join(", ") || "N/A"

const totalHours = (b.booking_slots || []).length

/* create element instead of innerHTML += (safer) */
const card = document.createElement("div")
card.className = "request-card"
card.style.background = color



card.innerHTML = `

<p class="title-label">Title</p>
<h2 class="main-title">${b.event_name || "No Title"}</h2>

<p><b>Venue:</b> ${b.venues?.venue_name || "N/A"}</p>
<p><b>Date:</b> ${b.booking_date || "-"}</p>

<p><b>Slots:</b> ${slots}</p>
<p><b>Total Hours:</b> ${totalHours}</p>

<p><b>Total Students:</b> ${b.total_students || "-"}</p>

<p><b>Status:</b> ${(b.status || "").toUpperCase()}</p>

<p class="desc-label">Description</p>
<div class="desc-box">
  ${b.description || "No description"}
</div>

`

container.appendChild(card)

})

}catch(err){
console.error("Unexpected error:", err)
document.getElementById("myBookings").innerHTML = "<p>Something went wrong</p>"
}

}

/* PROFILE + NAVBAR */
async function init(){

try{

const { data:{ session }, error } = await supabase.auth.getSession()

if(error || !session){
location="login.html"
return
}

const { data: profile, error:profileError } = await supabase
.from("profiles")
.select("*")
.eq("id", session.user.id)
.single()

if(profileError){
console.error("Profile error:", profileError.message)
return
}

/* hide all */
document.getElementById("bookVenue").style.display="none";
document.getElementById("myBookingsLink").style.display="none";
document.getElementById("acceptBooking").style.display="none";

/* role-based UI */
if(profile.role === "faculty"){
document.getElementById("bookVenue").style.display="block";
document.getElementById("myBookingsLink").style.display="block";
}
else if(profile.role === "admin"){
document.getElementById("acceptBooking").style.display="block";
}

/* load bookings */
await loadMyBookings()

}catch(err){
console.error("Init error:", err)
}

}

/* DROPDOWN + LOGOUT */
window.addEventListener("DOMContentLoaded", () => {

const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");

profileBtn.addEventListener("click", (e)=>{
e.stopPropagation();
profileMenu.classList.toggle("show");
});

document.addEventListener("click", ()=>{
profileMenu.classList.remove("show");
});

/* logout */
document.getElementById("logoutBtn").onclick = async (e)=>{
e.preventDefault()
await supabase.auth.signOut()
location="login.html"
}

})

init()

</script>
