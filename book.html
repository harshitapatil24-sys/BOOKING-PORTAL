<!DOCTYPE html>
<html>
<head>

<title>Book Venue</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<img src="pccoe.jpg" class="logo">

<ul class="nav-links">
<li><a href="dashboard.html">Home</a></li>
<li><a href="#">Halls</a></li>
<li><a href="#">Blog</a></li>
<li><a href="#">Q/A</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="profile">
<button id="profileBtn">👤</button>

<div class="dropdown" id="profileMenu">
<a href="#">View Profile</a>
<a href="book.html">Book Venue</a>
<a href="youtbooking.html">Your Bookings</a>
<a href="accept.html">Accept Booking</a>
<a href="index.html" id="logoutBtn">Logout</a>
</div>
</div>
</nav>

<!-- USER BAR -->
<div class="userbar">
<span id="facultyInfo">Loading user...</span>
</div>

<div class="booking-wrapper">
<h2 class="booking-title">Venue Booking Form</h2>

<div class="booking-card">

<div class="booking-grid">

<div class="field">
<label>Faculty Name</label>
<input id="facultyName" readonly>
</div>

<div class="field">
<label>Employee ID</label>
<input id="empId" readonly>
</div>

<div class="field">
<label>Department</label>
<input id="dept" readonly>
</div>

<div class="field">
<label>Event Name *</label>
<input id="eventName">
</div>

<div class="field">
<label>Total Students *</label>
<input type="number" id="totalStudents">
</div>

<div class="field full">
<label>Description</label>
<textarea id="eventDesc"></textarea>
</div>

<div class="field">
<label>Venue *</label>
<select id="venue">
<option value="">Select Venue</option>
<option value="47bf6743-3845-4cc9-b4ee-8f01e42b6efd">Auditorium</option>
<option value="f037d0c8-74da-45a2-a977-a3ceb7cb42e5">Seminar Hall 1</option>
<option value="f1088a0c-4890-41b5-80ef-62bcae6e7024">Seminar Hall 2</option>
<option value="5df13a70-fecb-4ab1-a326-0c7d32279ab6">Sports Hall</option>
<option value="7d54aa73-b381-4d59-bdeb-7bf04c44ebe9">Reading Hall</option>
</select>
</div>

<div class="field">
<label>Date *</label>
<input type="date" id="date">
</div>

<div class="field">
<label>Day</label>
<input id="day" readonly>
</div>

</div>
<div class="legend">
    <span><span class="box available"></span> Available</span>
    <span><span class="box pending"></span> Pending</span>
    <span><span class="box booked"></span> Booked</span>
</div>
<h3>Select Slots *</h3>

<div class="slots-area">
<div id="slotsContainer"></div>

<div class="hours-box">
<p>Total Hours</p>
<h2 id="totalHours">0</h2>
</div>
</div>

<button class="submitBtn" onclick="submitBooking()">Submit Booking</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
"https://xgrzymhgssxjjkogvuvw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhncnp5bWhnc3N4amprb2d2dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzAyNTYsImV4cCI6MjA4Nzg0NjI1Nn0.A6tbTA6D2mmGdNTrm2oS5HSTJzgkMFbGARQQi5dL-TQ"
)
/* DROPDOWN FIX */
const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");

profileBtn.addEventListener("click", (e)=>{
    e.stopPropagation();
    profileMenu.classList.toggle("show");
});

document.addEventListener("click", ()=>{
    profileMenu.classList.remove("show");
});

let selectedSlots = []

/* PROFILE + AUTH */
async function init(){
const { data:{ session } } = await client.auth.getSession()

if(!session){
location="login.html"
return
}

const { data: profile } = await client
.from("profiles")
.select("*")
.eq("id", session.user.id)
.single()

facultyName.value = profile?.name || ""
empId.value = profile?.employee_id || ""
dept.value = profile?.department || ""

facultyInfo.innerText =
`${profile?.name} | ${profile?.employee_id} | ${profile?.department}`
}
init()

/* DATE */
date.min = new Date().toISOString().split("T")[0]

date.onchange = ()=>{
const d = new Date(date.value)
const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"]
day.value = days[d.getDay()]
loadSlots()
}

venue.onchange = loadSlots

/* LOAD SLOTS */
async function loadSlots(){

if(!venue.value || !date.value) return

selectedSlots=[]
totalHours.innerText=0

const { data: slots } = await client.from("slots").select("*")

const { data: bookings } = await client
.from("booking_requests")
.select("id, status")
.eq("venue_id", venue.value)
.eq("booking_date", date.value)

let bookedMap = {}

if(bookings && bookings.length > 0){

const { data: slotData } = await client
.from("booking_slots")
.select("booking_id, slot_id")
.in("booking_id", bookings.map(b => b.id))

slotData?.forEach(s=>{
const booking = bookings.find(b => b.id === s.booking_id)
if(booking){
bookedMap[s.slot_id] = booking.status
}
})
}

slotsContainer.innerHTML=""

slots?.forEach(slot=>{

const label=document.createElement("label")
const input=document.createElement("input")

input.type="checkbox"
input.value=slot.id

label.className = "slot";

if(bookedMap[slot.id]){
    if(bookedMap[slot.id] === "pending"){
        label.classList.add("pending");
        input.disabled = true;
    }
    else if(bookedMap[slot.id] === "accepted"){
        label.classList.add("booked");
        input.disabled = true;
    }
} else {
    label.classList.add("available");
}

input.onchange=()=>{
if(input.checked) selectedSlots.push(slot.id)
else selectedSlots=selectedSlots.filter(x=>x!==slot.id)
totalHours.innerText=selectedSlots.length
}

label.appendChild(input)
label.append(` ${slot.start_time} - ${slot.end_time}`)
slotsContainer.appendChild(label)

})
}

/* SUBMIT */
async function submitBooking(){

try{

const eventName = document.getElementById("eventName").value
const totalStudentsVal = document.getElementById("totalStudents").value
const venueVal = document.getElementById("venue").value
const dateVal = document.getElementById("date").value
const description = document.getElementById("eventDesc").value

if(!eventName || !totalStudentsVal || !venueVal || !dateVal || selectedSlots.length===0){
alert("Fill all required fields")
return
}

const { data:{ session } } = await client.auth.getSession()

const { data: booking, error } = await client
.from("booking_requests")
.insert({
user_id: session.user.id,
venue_id: venueVal,   // ✅ UUID FIX
booking_date: dateVal,
event_name: eventName,
description: description,
total_students: parseInt(totalStudentsVal),
status: "pending"
})
.select()
.single()

if(error){
console.error(error)
alert(error.message)
return
}

const { error: slotError } = await client
.from("booking_slots")
.insert(
selectedSlots.map(s => ({
booking_id: booking.id,
slot_id: s   // ✅ UUID FIX
}))
)

if(slotError){
console.error(slotError)
alert("Slot insert failed")
return
}

alert("Booking Submitted Successfully")
location.reload()

}catch(err){
console.error(err)
alert("Something went wrong")
}
}
</script>

</body>
</html>
